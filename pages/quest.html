  <a href="./quest.html">

  </a>

</div>

<!-- EN Quest画面 -->
<div class="quest-screen">
<button id="bgmStartButton" class="bgm-start-button">
  ♪
</button>

<audio
  id="enquestBgm"
  src="../assets/sounds/enquest-bgm.mp3"
  loop
  preload="auto"
></audio>
  <!-- NAME ARENA -->
  <a href="namearena.html"
   class="quest-hotspot quest-namearena">
</a>

  <!-- LISTENING -->
  <a href="#"
     class="quest-hotspot quest-listening">
  </a>

  <!-- ENERGY -->
  <a href="#"
     class="quest-hotspot quest-energy">
  </a>
<!-- JunPoko隠しコマンド用 -->

<div class="jp-command-zone jp-head"></div>

<div class="jp-command-zone jp-left-shoulder"></div>

<div class="jp-command-zone jp-right-shoulder"></div>

<div class="jp-command-zone jp-chest"></div>
</div>


<!-- JunPoko Mode 暗転演出 -->
<div id="junpokoAwakeOverlay" class="junpoko-awake-overlay">
  <div class="junpoko-awake-text" id="junpokoAwakeText">
    六つの試練を越えよ。
  </div>
</div>

<!-- JunPoko Mode ミッション枠 -->
<div id="junpokoMissionBar" class="junpoko-mission-bar">
  <div class="junpoko-mission-title">
    🎁 ミッション
    <span id="junpokoMissionBadge" class="junpoko-mission-badge">1</span>
  </div>

  <div class="junpoko-mission-list">
    <div class="junpoko-mission-card" data-mission="nameClear">
      <span>① NAME ARENAを<br>1回クリア</span>
      <strong id="missionNameClear">0/1</strong>
    </div>

    <div class="junpoko-mission-card" data-mission="combo10">
      <span>② 10コンボ達成</span>
      <strong id="missionCombo10">0/10</strong>
    </div>

    <div class="junpoko-mission-card" data-mission="walkClear">
      <span>③ WALK PARKを<br>1回クリア</span>
      <strong id="missionWalkClear">0/1</strong>
    </div>

    <div class="junpoko-mission-card" data-mission="energyClear">
      <span>④ ENERGY STAGEを<br>1回クリア</span>
      <strong id="missionEnergyClear">0/1</strong>
    </div>

    <div class="junpoko-mission-card" data-mission="daily3">
      <span>⑤ トレーニングを<br>3日分達成</span>
      <strong id="missionDaily3">0/3</strong>
    </div>

    <div class="junpoko-mission-card" data-mission="longPress">
      <span>⑥ JunPokoを<br>7回タップ</span>
      <strong id="missionLongPress">0/1</strong>
    </div>
  </div>
</div>
<script src="../script.js?v=1"></script>
<script src="../js/quest.js?v=16"></script>
</body>
</html>
