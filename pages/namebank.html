<body>

<div class="container">

  <h1>Name Bank</h1>

  <p>
    Pokémon EN Name Database
  </p>
  <div class="search-area">

  <input
    type="text"
    id="pokemonSearch"
    class="pokemon-search"
    placeholder="Search Pokémon name..."
  >

  <button id="searchButton" class="search-button">
    Search
  </button>
<div class="filter-area">

  <button class="filter-button active" data-gen="all">
    All
  </button>

  <button class="filter-button" data-gen="1">
    Gen 1
  </button>

  <button class="filter-button" data-gen="2">
    Gen 2
  </button>

  <button class="filter-button" data-gen="3">
    Gen 3
  </button>

  <button class="filter-button" data-gen="4">
    Gen 4
  </button>

  <button class="filter-button" data-gen="5">
    Gen 5
  </button>

  <button class="filter-button" data-gen="6">
    Gen 6
  </button>

  <button class="filter-button" data-gen="7">
    Gen 7
  </button>

  <button class="filter-button" data-gen="8">
    Gen 8
  </button>

  <button class="filter-button" data-gen="9">
    Gen 9
  </button>

</div>

</div>
  <div id="pokemonList" class="pokemon-list">
  Loading...
</div>

</div>
