<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">

  <title>NAME ARENA GAME - GET</title>

  <link rel="stylesheet" href="../css/namearena-game.css?v=1">
</head>

<body>

<div class="arena-screen">

  <div class="arena-header">
    NAME ARENA
  </div>

  <section class="battle-banner">
    <div class="battle-character sheep">🐑</div>
    <div class="vs-text">VS</div>
    <div class="battle-character coach">🐏</div>
  </section>

  <section class="question-card">
    <div class="question-label">お題</div>
    <div class="question-text">ピカチュウ</div>
    <button class="sound-button" type="button">🔊</button>
  </section>

  <section class="time-area">
    <div class="time-label">TIME</div>
    <div class="time-bar">
      <div class="time-fill"></div>
    </div>
    <div class="time-count">18</div>
  </section>

  <section class="answer-grid">
    <button class="answer-button">Pikachu</button>
    <button class="answer-button">Pikachuu</button>
    <button class="answer-button">Pikatchu</button>
    <button class="answer-button">Pikachu!</button>
  </section>

  <div class="arena-footer">
    <a href="./quest.html" class="footer-button">←</a>

    <div class="combo-box">
      <span>連続正解</span>
      <strong>3</strong>
      <small>COMBO</small>
    </div>

    <button class="footer-button" type="button">?</button>
  </div>

</div>

</body>
</html>
