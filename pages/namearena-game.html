<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">

  <title>NAME ARENA GAME - GET</title>

  <link rel="stylesheet" href="../css/namearena-game.css?v=16">
</head>

<body>

<div class="arena-screen">

  <div class="wood-frame">

    <div class="status-area">
  <div class="hp-box" id="hpBox">
    ❤️ ❤️ ❤️
  </div>

  <div class="sheep-message" id="sheepMessage">
    Ready!
  </div>

  <button id="exitButton" class="exit-button" type="button">
    ×
  </button>
</div>

    <section class="question-box">
      <div class="question-label">
        お題
      </div>

      <div class="question-text" id="questionText">
        ピカチュウ
      </div>

      <button class="sound-button" type="button" id="soundButton">
        🔊
      </button>
    </section>

    <section class="timer-box">
      <div class="timer-label">
        TIME
      </div>

      <div class="timer-bar">
        <div class="timer-fill" id="timerFill"></div>
      </div>

      <div class="timer-count" id="timerCount">
        18
      </div>
    </section>

    <section class="answer-grid">
      <button class="answer-button"></button>
      <button class="answer-button"></button>
      <button class="answer-button"></button>
      <button class="answer-button"></button>
    </section>

  </div>

</div>

<div id="comboCutin" class="combo-cutin hidden">

  <img
    id="comboImage"
    class="combo-image"
    src=""
    alt=""
  >

</div>

<script src="../js/namearena-game.js?v=25"></script>
